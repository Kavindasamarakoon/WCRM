version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: versawa-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: versawa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: versawa-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
